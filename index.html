<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="renderer" content="webkit">
<meta name="x5-fullscreen" content="true">
<meta name="x5-page-translation" content="none">

<title>雅思备考助手 - 8周学习计划</title>

<!-- Critical inline CSS (fallback when Tailwind fails to load) -->
<style id="critical-css">
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;font-size:16px;line-height:1.5;color:#1f2937;background:#f9fafb;-webkit-text-size-adjust:100%}
  #app{min-height:100%;display:flex;flex-direction:column}
  .hidden{display:none!important}
  .flex{display:flex}
  .flex-col{flex-direction:column}
  .flex-1{flex:1 1 0%}
  .items-center{align-items:center}
  .justify-center{justify-content:center}
  .justify-between{justify-content:space-between}
  .gap-2{gap:8px}
  .gap-4{gap:16px}
  .p-4{padding:16px}
  .px-4{padding-left:16px;padding-right:16px}
  .py-2{padding-top:8px;padding-bottom:8px}
  .py-3{padding-top:12px;padding-bottom:12px}
  .mb-4{margin-bottom:16px}
  .mt-2{margin-top:8px}
  .rounded-lg{border-radius:12px}
  .rounded-full{border-radius:9999px}
  .bg-white{background:#fff}
  .bg-indigo-600{background:#4f46e5}
  .bg-green-500{background:#10b981}
  .bg-gray-100{background:#f3f4f6}
  .bg-gray-50{background:#f9fafb}
  .text-white{color:#fff}
  .text-gray-500{color:#6b7280}
  .text-gray-600{color:#4b5563}
  .text-gray-700{color:#374151}
  .text-gray-900{color:#111827}
  .text-sm{font-size:14px}
  .text-xs{font-size:12px}
  .text-lg{font-size:18px}
  .text-xl{font-size:20px}
  .text-2xl{font-size:24px}
  .font-bold{font-weight:700}
  .font-medium{font-weight:500}
  .text-center{text-align:center}
  .shadow{box-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06)}
  .shadow-sm{box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .w-full{width:100%}
  .max-w-4xl{max-width:896px}
  .mx-auto{margin-left:auto;margin-right:auto}
  .px-2{padding-left:8px;padding-right:8px}
  .py-1{padding-top:4px;padding-bottom:4px}
  .mb-3{margin-bottom:12px}
  .p-2{padding:8px}
  .bg-orange-50{background:#fff7ed}
  .text-orange-600{color:#ea580c}
  .overflow-auto{overflow:auto}
  .relative{position:relative}
  .absolute{position:absolute}
  .fixed{position:fixed}
  .bottom-0{bottom:0}
  .left-0{left:0}
  .right-0{right:0}
  .top-0{top:0}
  .z-10{z-index:10}
  .z-50{z-index:50}
  .overflow-hidden{overflow:hidden}
  .truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cursor-pointer{cursor:pointer}
  .transition{transition:all .2s ease}
  .grid{display:grid}
  .grid-cols-2{grid-template-columns:repeat(2,1fr)}
  .grid-cols-4{grid-template-columns:repeat(4,1fr)}
  .border{border:1px solid #e5e7eb}
  .border-t{border-top:1px solid #e5e7eb}
  .border-b{border-bottom:1px solid #e5e7eb}

  /* Page sections */
  [data-page]{display:none}
  [data-page].active{display:block}

  /* Top nav */
  #top-nav{position:sticky;top:0;z-index:40;background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}

  /* Bottom tab bar */
  #bottom-tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:#fff;border-top:1px solid #e5e7eb;display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,0)}
  .tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;color:#9ca3af;cursor:pointer;transition:color .2s;min-width:56px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .tab-item.active{color:#4f46e5}
  .tab-item svg{width:24px;height:24px}
  .tab-item span{font-size:10px;line-height:1}

  /* Main content area */
  #main-content{flex:1;padding-bottom:70px;overflow-y:auto}

  /* Toast */
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:toastIn .3s ease;max-width:90vw}
  .toast-success{background:#10b981}
  .toast-error{background:#ef4444}
  .toast-info{background:#3b82f6}
  .toast-encourage{background:#8b5cf6}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  /* Modal overlay */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:flex;align-items:center;justify-content:center;padding:16px}
  .modal-box{background:#fff;border-radius:16px;padding:24px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .2s ease}
  @keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

  /* Responsive */
  @media (min-width:768px) {
    #bottom-tab-bar{position:fixed;left:0;top:60px;bottom:0;width:200px;flex-direction:column;justify-content:flex-start;gap:4px;padding:12px;border-right:1px solid #e5e7eb;border-top:none}
    .tab-item{flex-direction:row;gap:12px;padding:10px 12px;border-radius:8px;width:100%;justify-content:flex-start}
    .tab-item span{font-size:14px}
    #main-content{margin-left:200px;padding-bottom:0}
    #top-nav{padding-left:216px}
  }
</style>

  <!-- Bottom Tab Bar -->

<script>
// ============================================================
// Part 1: Polyfills & Feature Detection
// ============================================================
(function() {
  // Detect Web Speech API support
  window._FEATURES = {
    speechSynthesis: (
      typeof SpeechSynthesisUtterance !== 'undefined' &&
      'speechSynthesis' in window &&
      window.speechSynthesis !== null
    ),
    online: navigator.onLine,
    touchDevice: ('ontouchstart' in window) || (navigator.maxTouchPoints > 0)
  };
})();

// ============================================================
// Part 2: Router
// ============================================================
var APP = {
  _routeHandlers: {},

  init: function() {
    var self = this;
    window.addEventListener('hashchange', function() { self._handleRoute(); });
    // Initial route
    if (!location.hash) { location.hash = '#/home'; }
    self._handleRoute();
    self._bindNavButtons();
  },

  _handleRoute: function() {
    // Remove '#' and leading '/', then split
    var hash = location.hash.replace('#', '').replace(/^\//, '') || 'home';
    var parts = hash.split('/');
    var page = parts[0];
    var subPage = parts[1];
    var subId = parts[2];

    // Hide all page sections
    var sections = document.querySelectorAll('[data-page]');
    for (var i = 0; i < sections.length; i++) {
      sections[i].style.display = 'none';
      sections[i].classList.remove('active');
    }

    // Show target page
    var target = document.querySelector('[data-page="' + page + '"]');
    if (!target) {
      location.hash = '#/home';
      return;
    }
    target.style.display = 'block';
    target.classList.add('active');

    // Update active tab
    this._updateActiveTab(page);

    // Update title
    this._updateTitle(page);

    // Call handler
    if (this._routeHandlers[page]) {
      this._routeHandlers[page](subPage, subId);
    }

    // Scroll to top
    window.scrollTo(0, 0);
  },

  _updateActiveTab: function(page) {
    var tabMapping = {
      'home': 'home',
      'listening': 'listening',
      'reading': 'reading',
      'writing': 'writing',
      'speaking': 'speaking',
      'settings': null,
      'faq': null
    };
    var activeTab = tabMapping[page];
    var items = document.querySelectorAll('#bottom-tab-bar .tab-item');
    for (var i = 0; i < items.length; i++) {
      var tab = items[i].getAttribute('data-tab');
      if (tab === activeTab) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }
  },

  _updateTitle: function(page) {
    var titles = {
      'home': '雅思备考',
      'listening': '听力',
      'reading': '阅读',
      'writing': '写作',
      'speaking': '口语',
      'settings': '设置',
      'faq': '常见问题'
    };
    var titleEl = document.getElementById('top-nav-title');
    if (titleEl) { titleEl.textContent = titles[page] || '雅思备考'; }
  },

  _bindNavButtons: function() {
    var self = this;
    var btnSettings = document.getElementById('btn-settings');
    if (btnSettings) {
      btnSettings.addEventListener('click', function() { self.navigateTo('settings'); });
      btnSettings.addEventListener('touchend', function(e) {
        e.preventDefault();
        self.navigateTo('settings');
      });
    }
  },

  navigateTo: function(hash) {
    if (hash.indexOf('#/') !== 0) {
      hash = '#/' + hash;
    }
    location.hash = hash;
    // DEBUG: update debug bar
    var dbg = document.getElementById('dbg-hash');
    if (dbg) dbg.textContent = 'hash: ' + location.hash;
  },

  getCurrentPage: function() {
    var hash = location.hash.replace('#', '').replace(/^\//, '') || 'home';
    return hash.split('/')[0];
  },

  getCurrentPageParams: function() {
    var hash = location.hash.replace('#', '').replace(/^\//, '') || 'home';
    var parts = hash.split('/');
    return {
      page: parts[0],
      subPage: parts[1],
      subId: parts[2]
    };
  },

  onRoute: function(page, handler) {
    this._routeHandlers[page] = handler;
  }
};

// ============================================================
// Part 3: Storage Engine
// ============================================================
var Storage = {
  PREFIX: 'ielts_study_v1_',
  _persistTimer: null,
  _persistDebounceMs: 300,

  save: function(key, data) {
    try {
      var payload = JSON.stringify({
        data: data,
        timestamp: Date.now(),
        version: 1
      });
      if (payload.length > 500000) {
        APP.showToast('数据较大，建议导出备份', 'info', 5000);
      }
      localStorage.setItem(this.PREFIX + key, payload);
      return true;
    } catch(e) {
      if (e.name === 'QuotaExceededError' || e.number === -2147024882) {
        APP.showToast('存储空间不足，请导出备份后重置', 'error', 8000);
      } else {
        console.error('Storage.save error:', e);
      }
      return false;
    }
  },

  load: function(key, defaultValue) {
    try {
      var raw = localStorage.getItem(this.PREFIX + key);
      if (!raw) return defaultValue;
      var parsed = JSON.parse(raw);
      return parsed.data !== undefined ? parsed.data : defaultValue;
    } catch(e) {
      console.error('Storage.load error:', e);
      return defaultValue;
    }
  },

  remove: function(key) {
    try { localStorage.removeItem(this.PREFIX + key); } catch(e) {}
  },

  clear: function() {
    try {
      var keysToRemove = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf(this.PREFIX) === 0) {
          keysToRemove.push(k);
        }
      }
      for (var j = 0; j < keysToRemove.length; j++) {
        localStorage.removeItem(keysToRemove[j]);
      }
    } catch(e) {
      console.error('Storage.clear error:', e);
    }
  }
};

// ============================================================
// Part 4: State Management
// ============================================================
var DEFAULT_STATE = {
  currentWeek: 1,
  currentDay: 1,
  completedItems: '',
  masteredWords: { listening: '', reading: '', writing: '', speaking: '' },
  wrongWords: [],
  unlockedWeeks: [1],
  stats: {
    studyDays: 0,
    lastStudyDate: null,
    streakDays: 0,
    totalCompletions: 0
  },
  settings: {
    audioSpeed: 1.0,
    autoNext: true,
    audioEnabled: true
  },
  version: 1,
  lastExportPrompt: null,
  onboardingDone: false
};

var AppState = null;

function loadStateFromStorage() {
  var saved = Storage.load('state', null);
  if (saved && saved.version) {
    AppState = saved;
    // Migration: ensure all fields exist
    _migrateState();
  } else {
    AppState = JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
  _updateStreak();
}

function _migrateState() {
  var defaults = DEFAULT_STATE;
  var changed = false;
  // Add missing top-level keys
  for (var key in defaults) {
    if (defaults.hasOwnProperty(key) && AppState[key] === undefined) {
      AppState[key] = JSON.parse(JSON.stringify(defaults[key]));
      changed = true;
    }
  }
  // Add missing stats keys
  for (var sk in defaults.stats) {
    if (defaults.stats.hasOwnProperty(sk) && AppState.stats[sk] === undefined) {
      AppState.stats[sk] = defaults.stats[sk];
      changed = true;
    }
  }
  // Add missing settings keys
  for (var ck in defaults.settings) {
    if (defaults.settings.hasOwnProperty(ck) && AppState.settings[ck] === undefined) {
      AppState.settings[ck] = defaults.settings[ck];
      changed = true;
    }
  }
  // Add missing masteredWords keys
  for (var mk in defaults.masteredWords) {
    if (defaults.masteredWords.hasOwnProperty(mk) && AppState.masteredWords[mk] === undefined) {
      AppState.masteredWords[mk] = '';
      changed = true;
    }
  }
  if (changed) {
    schedulePersist();
  }
}

function updateState(path, value) {
  var parts = path.split('.');
  var target = AppState;
  for (var i = 0; i < parts.length - 1; i++) {
    if (target[parts[i]] === undefined) return false;
    target = target[parts[i]];
  }
  var lastKey = parts[parts.length - 1];
  if (target[lastKey] !== value) {
    target[lastKey] = value;
    schedulePersist();
    _notifyStateChange(path);
  }
  return true;
}

function _notifyStateChange(path) {
  // Re-render affected UI sections
  var page = APP.getCurrentPage();
  if (page === 'home') {
    _refreshHomeProgress();
  }
  _updateStreakBadge();
}

function schedulePersist() {
  if (Storage._persistTimer) {
    clearTimeout(Storage._persistTimer);
  }
  Storage._persistTimer = setTimeout(function() {
    Storage.save('state', AppState);
    Storage._persistTimer = null;
  }, Storage._persistDebounceMs);
}

function _updateStreak() {
  var today = _getDateString();
  var lastDate = AppState.stats.lastStudyDate;
  if (lastDate === today) return;
  var yesterday = _getDateString(new Date(Date.now() - 86400000));
  if (lastDate === yesterday) {
    AppState.stats.streakDays = (AppState.stats.streakDays || 0) + 1;
  } else if (lastDate !== today) {
    AppState.stats.streakDays = 1;
  }
  AppState.stats.lastStudyDate = today;
  AppState.stats.studyDays = (AppState.stats.studyDays || 0) + 1;
  schedulePersist();
}

function _getDateString(date) {
  var d = date || new Date();
  var month = d.getMonth() + 1;
  var day = d.getDate();
  return d.getFullYear() + '-' + (month < 10 ? '0' : '') + month + '-' + (day < 10 ? '0' : '') + day;
}

APP.showModal = function(title, content, options) {
  var opt = options || {};
  var container = document.getElementById('modal-container');
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

  var box = document.createElement('div');
  box.className = 'modal-box';

  var html = '';
  html += '<h3 style="margin-bottom:12px;font-size:18px;font-weight:700;color:#1f2937">' + title + '</h3>';
  html += '<div style="margin-bottom:16px;font-size:14px;color:#4b5563">' + content + '</div>';
  html += '<div style="display:flex;gap:8px;justify-content:flex-end">';
  if (opt.showCancel !== false) {
    html += '<button id="modal-btn-cancel" style="padding:8px 16px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#374151;font-size:14px;cursor:pointer">' + (opt.cancelText || '取消') + '</button>';
  }
  html += '<button id="modal-btn-confirm" style="padding:8px 16px;border:none;border-radius:8px;background:#4F46E5;color:#fff;font-size:14px;cursor:pointer">' + (opt.confirmText || '确定') + '</button>';
  html += '</div>';

  box.innerHTML = html;
  overlay.appendChild(box);
  container.appendChild(overlay);

  var closeModal = function(result) {
    if (overlay.parentNode) {
      overlay.style.opacity = '0';
      overlay.style.transition = 'opacity .2s';
      setTimeout(function() {
        if (overlay.parentNode) { overlay.parentNode.removeChild(overlay); }
      }, 200);
    }
    if (result && opt.onConfirm) { opt.onConfirm(); }
    if (!result && opt.onCancel) { opt.onCancel(); }
  };

  document.getElementById('modal-btn-confirm').addEventListener('click', function() { closeModal(true); });
  var cancelBtn = document.getElementById('modal-btn-cancel');
  if (cancelBtn) {
    cancelBtn.addEventListener('click', function() { closeModal(false); });
  }
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) { closeModal(false); }
  });
};

// ============================================================
function _isItemCompleted(taskId) {
  if (!AppState || !AppState.completedItems) return false;
  return AppState.completedItems.indexOf(taskId) >= 0;
}

function _toggleTaskComplete(taskId) {
  if (!AppState) return;
  var items = AppState.completedItems ? AppState.completedItems.split(',').filter(function(s) { return s.length > 0; }) : [];
  var idx = items.indexOf(taskId);
  if (idx >= 0) {
    items.splice(idx, 1);
  } else {
    items.push(taskId);
    AppState.stats.totalCompletions = (AppState.stats.totalCompletions || 0) + 1;
  }
  updateState('completedItems', items.join(','));
  _updateStreak();
  _updateStreakBadge();
}

function _calculateModuleProgress(module) {
  if (!AppState) return 0;
  var total = 0;
  var done = 0;
  // Estimate total tasks per module: 8 weeks x 6 days x ~3 tasks = 144
  total = 144;
  var items = AppState.completedItems ? AppState.completedItems.split(',') : [];
  for (var i = 0; i < items.length; i++) {
    if (items[i].indexOf('-' + module) >= 0 || items[i].indexOf(module + '-') >= 0) {
      done++;
    }
  }
  return total > 0 ? Math.round(done / total * 100) : 0;
}

function _calculateOverallProgress() {
  if (!AppState) return 0;
  var total = 576; // 8 weeks x 6 days x 4 modules x ~3 tasks
  var items = AppState.completedItems ? AppState.completedItems.split(',').filter(function(s) { return s.length > 0; }) : [];
  return total > 0 ? Math.round(items.length / total * 100) : 0;
}

function _getCompletedWeeks() {
  if (!AppState) return [];
  var completed = {};
  var items = AppState.completedItems ? AppState.completedItems.split(',') : [];
  for (var i = 0; i < items.length; i++) {
    var match = items[i].match(/w(\d+)d/);
    if (match) {
      var w = parseInt(match[1], 10);
      if (!completed[w]) completed[w] = { total: 0, done: 0 };
      completed[w].done++;
    }
  }
  // A week is "completed" if all tasks across 4 modules x 6 days are done
  // For simplicity, ~72 tasks per week, if >80% done consider completed
  var result = [];
  for (var w = 1; w <= 8; w++) {
    if (completed[w] && completed[w].done >= 58) {
      result.push(w);
    }
  }
  return result;
}

/* ProgressRing: SVG circular progress */
function createProgressRing(percent, size, strokeColor) {
  if (!size) size = 120;
  if (!strokeColor) strokeColor = '#4F46E5';
  var radius = (size - 12) / 2;
  var circumference = 2 * Math.PI * radius;
  var offset = circumference - (percent / 100) * circumference;

  var container = document.createElement('div');
  container.style.cssText = 'position:relative;width:' + size + 'px;height:' + size + 'px;display:inline-block';

  var svgHTML = '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">';
  svgHTML += '<circle cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + radius + '" fill="none" stroke="#e5e7eb" stroke-width="6"/>';
  svgHTML += '<circle cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + radius + '" fill="none" stroke="' + strokeColor + '" stroke-width="6" stroke-linecap="round" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '" style="transition:stroke-dashoffset .6s ease;transform:rotate(-90deg);transform-origin:center"/>';
  svgHTML += '</svg>';

  var textHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">';
  textHTML += '<span style="font-size:' + (size/5) + 'px;font-weight:700;color:#1f2937">' + percent + '%</span>';
  textHTML += '</div>';

  container.innerHTML = svgHTML + textHTML;
  return container;
}

/* WeekTimeline: 8 interactive week dots */
function createWeekTimeline(currentWeek, unlockedWeeks, completedWeeks) {
  var container = document.createElement('div');
  container.style.cssText = 'display:flex;align-items:center;justify-content:space-between;position:relative;padding:8px 0';

  for (var w = 1; w <= 8; w++) {
    var dot = document.createElement('div');
    var isUnlocked = unlockedWeeks.indexOf(w) >= 0;
    var isCompleted = completedWeeks.indexOf(w) >= 0;
    var isCurrent = w === currentWeek;

    var bg = '#d1d5db';
    var textColor = '#9ca3af';
    if (isCompleted) { bg = '#10b981'; textColor = '#fff'; }
    else if (isCurrent) { bg = '#4F46E5'; textColor = '#fff'; }
    else if (isUnlocked) { bg = '#93c5fd'; textColor = '#fff'; }

    dot.style.cssText = 'width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:' + textColor + ';background:' + bg + ';cursor:' + (isUnlocked ? 'pointer' : 'default') + ';transition:transform .2s;z-index:1;touch-action:manipulation';
    dot.textContent = isCompleted ? '✓' : String(w);

    if (!isUnlocked) {
      dot.innerHTML = ICONS.lock;
      dot.style.color = '#9ca3af';
    }

    if (isUnlocked) {
      (function(weekNum) {
        dot.addEventListener('click', function() {

        dot.addEventListener('touchend', function(e) {
          e.preventDefault();
          APP.navigateTo('listening/week/' + weekNum);
        });
      })(w);
    }

    container.appendChild(dot);
  }
  return container;
}

    this._initialized = true;
    this.supported = _FEATURES.speechSynthesis;
    if (this.supported) {
      // Pre-warm audio on first user interaction
      var self = this;
      document.addEventListener('touchstart', function() { self._prime(); }, { once: true });
      document.addEventListener('click', function() { self._prime(); }, { once: true });
    }
  },

  _prime: function() {
    if (!this.supported) return;
    try {
      var u = new SpeechSynthesisUtterance('');
      u.volume = 0;
      u.rate = 1;
      window.speechSynthesis.speak(u);
      window.speechSynthesis.cancel();
    } catch(e) {}
  },

  speak: function(text, options) {
    if (!this.supported) {
      if (options && options.onFallback) options.onFallback(text);
      return false;
    }
    var opts = options || {};
    try {
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = opts.lang || 'en-US';
      u.rate = opts.rate || (AppState && AppState.settings ? AppState.settings.audioSpeed : 1.0);

      var self = this;
      u.onstart = function() {
        self.speaking = true;
        if (opts.onStart) opts.onStart();
      };
      u.onend = function() {
        self.speaking = false;
        if (opts.onEnd) opts.onEnd();
      };
      u.onerror = function(e) {
        self.speaking = false;
        if (e.error !== 'canceled' && e.error !== 'interrupted') {
          if (opts.onError) opts.onError(e);
          else if (opts.onFallback) opts.onFallback(text);
        }
      };
      window.speechSynthesis.speak(u);
      return true;
    } catch(e) {
      this.speaking = false;
      if (opts.onFallback) opts.onFallback(text);
      return false;
    }
  },

  stop: function() {
    if (this.supported) {
      try { window.speechSynthesis.cancel(); } catch(e) {}
    }
    this.speaking = false;
  },

  isSpeaking: function() {
    if (this.supported) {
      try { return window.speechSynthesis.speaking; } catch(e) { return false; }
    }
    return this.speaking;
  }
};

function createAudioButton(text, options) {
  var btn = document.createElement('button');
  btn.style.cssText = 'width:40px;height:40px;border-radius:50%;border:2px solid #e5e7eb;background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;transition:all .2s;-webkit-tap-highlight-color:transparent;flex-shrink:0';
  btn.innerHTML = ICONS.speaker;
  btn.setAttribute('aria-label', '播放发音');

  var state = 'idle'; // idle, loading, playing, error, fallback
  var opts = options || {};

  function setState(s) {
    state = s;
    switch(s) {
      case 'idle':
        btn.style.borderColor = '#e5e7eb';
        btn.style.background = '#fff';
        btn.innerHTML = ICONS.speaker;
        break;
      case 'loading':
        btn.style.borderColor = '#93c5fd';
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" style="animation:spin .8s linear infinite"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>';
        break;
      case 'playing':
        btn.style.borderColor = '#4F46E5';
        btn.style.background = '#eef2ff';
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="#4F46E5"><path d="M8 5v14l11-7z"/></svg>';
        break;
      case 'error':
        btn.style.borderColor = '#fca5a5';
        btn.style.background = '#fef2f2';
        btn.innerHTML = ICONS.refresh;
        break;
      case 'fallback':
        btn.style.borderColor = '#fbbf24';
        btn.style.background = '#fffbeb';
        btn.innerHTML = ICONS.info;
        break;
    }
  }

  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (state === 'playing') {
      AudioSystem.stop();
      setState('idle');
      return;
    }
    if (state === 'loading') return;

    setState('loading');
    AudioSystem.speak(text, {
      rate: opts.speed || 1.0,
      onStart: function() { setState('playing'); },
      onEnd: function() { setState('idle'); },
      onError: function() {
        setState('error');
        setTimeout(function() { if (state === 'error') setState('idle'); }, 3000);
      },
      onFallback: function() {
        setState('fallback');
        APP.showToast('当前浏览器不支持语音播放，请尝试复制单词到其他翻译软件', 'info', 4000);
        setTimeout(function() { if (state === 'fallback') setState('idle'); }, 3000);
      }
    });
  });

  return btn;
}

// Part 14: WordCard Component (flip animation)
// ============================================================
function createWordCard(word, phonetic, meaning, example) {
  var card = document.createElement('div');
  card.style.cssText = 'background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;cursor:pointer;touch-action:manipulation;transition:transform .2s,box-shadow .2s;position:relative;min-height:100px;-webkit-tap-highlight-color:transparent';

  var isFlipped = false;
  var audioBtn = null;

  function renderFront() {
    return '<div style="display:flex;align-items:center;justify-content:space-between;height:100%">' +
      '<div>' +
        '<div style="font-size:18px;font-weight:600;color:#1f2937;margin-bottom:4px">' + word + '</div>' +
        '<div style="font-size:13px;color:#9ca3af">' + (phonetic || '') + '</div>' +
      '</div>' +
      '<div id="audio-btn-' + word.replace(/[^a-zA-Z]/g, '') + '" style="flex-shrink:0"></div>' +
    '</div>';
  }

  function renderBack() {
    var html = '<div style="font-size:14px;color:#4b5563">';
    html += '<div style="font-size:16px;font-weight:600;color:#1f2937;margin-bottom:8px">' + (meaning || '') + '</div>';
    if (example) {
      html += '<div style="font-size:13px;color:#6b7280;font-style:italic">' + example + '</div>';
    }
    html += '</div>';
    return html;
  }

  card.innerHTML = renderFront();

  // Attach audio button after DOM is created
  setTimeout(function() {
    var placeholder = document.getElementById('audio-btn-' + word.replace(/[^a-zA-Z]/g, ''));
    if (placeholder) {
      audioBtn = createAudioButton(word);
      placeholder.appendChild(audioBtn);
    }
  }, 0);

  // Hover effect
  card.addEventListener('mouseenter', function() {
    card.style.boxShadow = '0 4px 12px rgba(0,0,0,.1)';
    card.style.transform = 'translateY(-2px)';
  });
  card.addEventListener('mouseleave', function() {
    card.style.boxShadow = 'none';
    card.style.transform = 'translateY(0)';
  });

  // Click to flip
  card.addEventListener('click', function(e) {
    // Don't flip if clicking audio button
    if (e.target.closest('button')) return;
    isFlipped = !isFlipped;
    card.style.transform = 'rotateY(180deg)';
    card.style.transition = 'transform .4s ease';
    setTimeout(function() {
      card.innerHTML = isFlipped ? renderBack() : renderFront();
      card.style.transform = 'rotateY(0deg)';
      // Re-attach audio btn if front
      if (!isFlipped) {
        var ph = document.getElementById('audio-btn-' + word.replace(/[^a-zA-Z]/g, ''));
        if (ph && audioBtn) ph.appendChild(audioBtn);
      }
    }, 200);
  });

  return card;
}

/* WordCardList: responsive grid of word cards */
function createWordCardList(words) {
  var grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:repeat(2,1fr);gap:8px';
  // Responsive: 1 col on very small, 2 on mobile, 3-4 on desktop
  if (window.innerWidth >= 768) {
    grid.style.gridTemplateColumns = 'repeat(3,1fr)';
  }
  if (window.innerWidth >= 1024) {
    grid.style.gridTemplateColumns = 'repeat(4,1fr)';
  }
  for (var i = 0; i < words.length; i++) {
    var w = words[i];
    grid.appendChild(createWordCard(w.en, w.phonetic, w.zh, w.example));
  }
  return grid;
}

/* DictationInput: input field for dictation practice */
function createDictationInput(correctWord, onResult) {
  var container = document.createElement('div');
  container.style.cssText = 'display:flex;gap:8px;align-items:center;margin-top:8px';

  var input = document.createElement('input');
  input.type = 'text';
  input.placeholder = '输入你听到的单词...';
  input.style.cssText = 'flex:1;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:16px;outline:none;transition:border-color .2s';

  var submitBtn = createButton('提交', 'primary', function() {
    var userInput = input.value.trim();
    var isCorrect = userInput.toLowerCase() === correctWord.toLowerCase();
    if (isCorrect) {
      input.style.borderColor = '#10b981';
      input.style.background = '#f0fdf4';
      APP.showToast('✓ 正确！', 'success', 1500);
    } else {
      input.style.borderColor = '#ef4444';
      input.style.background = '#fef2f2';
      APP.showToast('✗ 正确答案是: ' + correctWord, 'error', 3000);
    }
    if (onResult) onResult(isCorrect, userInput);
    setTimeout(function() {
      input.style.borderColor = '#d1d5db';
      input.style.background = '#fff';
      input.value = '';
      input.focus();
    }, 1500);
  });

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { submitBtn.click(); }
  });

  container.appendChild(input);
  container.appendChild(submitBtn);
  return container;
}

// Part 17: Listening Module Renderer
// ============================================================
function _getWeekContent(module, weekNum) {
  var data = CONTENT[module];
  if (!data || !data.weeks) return null;
  return data.weeks[weekNum - 1] || null;
}

function _renderModuleHeader(module, weekNum) {
  var data = CONTENT[module];
  var week = _getWeekContent(module, weekNum);
  var moduleIcons = { listening: '🎧', reading: '📖', writing: '✍️', speaking: '💬' };
  var html = '<div style="margin-bottom:12px">';
  html += '<h2 style="font-size:22px;font-weight:700;color:#1f2937;margin-bottom:4px">' + (moduleIcons[module] || '') + ' ' + data.title + '</h2>';
  if (week) {
    html += '<p style="color:#6b7280;font-size:14px">第' + weekNum + '周 · ' + week.title + '</p>';
  }
  html += '</div>';
  return html;
}

function renderListening(subPage, subId) {
  var weekNum = subId ? parseInt(subId, 10) : (AppState ? AppState.currentWeek : 1);
  if (isNaN(weekNum) || weekNum < 1) weekNum = 1;
  if (weekNum > 8) weekNum = 8;

  var container = document.getElementById('listening-content');
  if (!container) return;

  var html = '<div>';
  // Header
  html += _renderModuleHeader('listening', weekNum);

  // Week selector
  html += '<div id="listening-week-selector"></div>';

  // Day tabs
  var dayNames = ['周一', '周二', '周三', '周四', '周五', '周六', '复习'];
  html += '<div style="display:flex;gap:4px;overflow-x:auto;margin-bottom:16px;-webkit-overflow-scrolling:touch">';
  var currentDay = AppState ? AppState.currentDay : 1;
  var today = new Date().getDay();
  var activeDay = today >= 1 && today <= 7 ? today : currentDay;
  for (var d = 1; d <= 7; d++) {
    var isActive = d === activeDay;
    html += '<button class="day-tab-btn" data-day="' + d + '" style="min-width:44px;height:36px;border-radius:8px;border:' + (isActive ? '2px solid #4F46E5' : '1px solid #e5e7eb') + ';background:' + (isActive ? '#eef2ff' : '#fff') + ';color:' + (isActive ? '#4f46e5' : '#6b7280') + ';font-size:13px;cursor:pointer;white-space:nowrap;touch-action:manipulation">' + dayNames[d-1] + '</button>';
  }
  html += '</div>';

  // Content area
  html += '<div id="listening-day-content" style="margin-bottom:16px">';
  var week = _getWeekContent('listening', weekNum);
  if (week) {
    for (var d2 = 1; d2 <= 7; d2++) {
      var dayData = week.days[d2 - 1];
      var isVisible = d2 === activeDay;
      html += '<div class="day-content" data-day="' + d2 + '" style="' + (isVisible ? '' : 'display:none') + '">';
      if (dayData && dayData.tasks && dayData.tasks.length > 0) {
        for (var t = 0; t < dayData.tasks.length; t++) {
          var task = dayData.tasks[t];
          if (task.id === 'rest') {
            html += '<div style="text-align:center;padding:32px;color:#9ca3af"><p style="font-size:48px;margin-bottom:8px">😴</p><p>休息日 — 劳逸结合，效果更好！</p></div>';
          } else if (task.id === 'review') {
            html += '<div style="background:#fef3c7;border-radius:12px;padding:20px;text-align:center">';
            html += '<p style="font-size:24px;margin-bottom:8px">📝</p>';
            html += '<p style="font-weight:600;color:#92400e;margin-bottom:8px">' + task.title + '</p>';
            html += '<p style="font-size:14px;color:#92400e">复习本周学过的所有内容，特别是错词本中的单词。</p>';
            html += '</div>';
          } else if (task.type === 'vocabulary' && task.words) {
            html += '<div style="margin-bottom:12px">';
            html += '<h4 style="font-size:16px;font-weight:600;color:#1f2937;margin-bottom:8px">' + task.title + '</h4>';
            var taskId = _getTaskId(weekNum, d2, 'listening', t);
            var isDone = _isItemCompleted(taskId);
            html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
            html += '<div class="task-checkbox" data-taskid="' + taskId + '" style="width:20px;height:20px;border-radius:4px;border:2px solid ' + (isDone ? '#10b981' : '#d1d5db') + ';display:flex;align-items:center;justify-content:center;background:' + (isDone ? '#10b981' : '#fff') + ';cursor:pointer;flex-shrink:0">' + (isDone ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : '') + '</div>';
            html += '<span style="font-size:14px;color:#6b7280">' + (task.words ? task.words.length : 0) + ' 个单词</span>';
            html += '</div>';
            html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">';
            if (window.innerWidth >= 1024) {
              html = html.replace('repeat(2,1fr)', 'repeat(3,1fr)');
            }
            for (var wi = 0; wi < task.words.length; wi++) {
              var w = task.words[wi];
              var wordId = w.en.replace(/[^a-zA-Z]/g, '');
              html += '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;position:relative">';
              html += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
              html += '<div>';
              html += '<div style="font-size:16px;font-weight:600;color:#1f2937;margin-bottom:2px">' + w.en + '</div>';
              html += '<div style="font-size:12px;color:#9ca3af;margin-bottom:4px">' + (w.phonetic || '') + '</div>';
              html += '<div style="font-size:13px;color:#6b7280">' + w.zh + '</div>';
              if (w.example) {
                html += '<div style="font-size:12px;color:#9ca3af;font-style:italic;margin-top:4px">' + w.example + '</div>';
              }
              html += '</div>';
              html += '<div id="audio-listening-' + wordId + '" style="flex-shrink:0"></div>';
              html += '</div></div>';
            }
            html += '</div></div>';
          } else if (task.type === 'dictation' && task.sentences) {
            html += '<div style="margin-bottom:12px">';
            html += '<h4 style="font-size:16px;font-weight:600;color:#1f2937;margin-bottom:8px">' + task.title + '</h4>';
            for (var si = 0; si < task.sentences.length; si++) {
              var s = task.sentences[si];
              html += '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:8px">';
              html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
              html += '<span style="font-size:14px;color:#1f2937">📝 ' + s.zh + '</span>';
              html += '<div id="dict-audio-' + si + '" style="flex-shrink:0"></div>';
              html += '</div>';
              html += '<input type="text" placeholder="输入你听到的句子..." style="width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none" data-answer="' + s.text.replace(/"/g, '&quot;') + '">';
              html += '<button class="dict-check-btn" style="margin-top:6px;padding:6px 16px;border:none;border-radius:6px;background:#4F46E5;color:#fff;font-size:13px;cursor:pointer;touch-action:manipulation">检查</button>';
              html += '</div>';
            }
            html += '</div>';
          } else if (task.type === 'framework' || task.type === 'technique') {
            html += '<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:16px;margin-bottom:12px">';
            html += '<h4 style="font-size:16px;font-weight:600;color:#1e40af;margin-bottom:8px">' + task.title + '</h4>';
            html += '<div style="font-size:14px;color:#374151;line-height:1.7">' + (task.content || '') + '</div>';
            if (task.template) {
              html += '<div style="margin-top:8px;padding:8px 12px;background:#dbeafe;border-radius:6px;font-size:13px;color:#1e40af;font-family:monospace">' + task.template + '</div>';
            }
            html += '</div>';
          }
        }
      } else {
        html += '<p style="color:#9ca3af;text-align:center;padding:32px">内容开发中...</p>';
      }
      html += '</div>';
    }
  }
  html += '</div>';

  // Mark day complete button
  html += '<div style="text-align:center;margin-bottom:24px">';
  html += '<button id="btn-mark-day-complete" style="padding:10px 32px;border:none;border-radius:10px;background:#10b981;color:#fff;font-size:16px;font-weight:600;cursor:pointer;touch-action:manipulation;transition:transform .1s">✅ 完成今日任务</button>';
  html += '</div></div>';

  container.innerHTML = html;

  // Attach week selector
  var wsContainer = document.getElementById('listening-week-selector');
  if (wsContainer) {
    wsContainer.appendChild(createWeekSelector(weekNum, AppState ? AppState.unlockedWeeks : [1], function(newWeek) {
      APP.navigateTo('listening/week/' + newWeek);
    }));
  }

  // Day tab click handlers
  var dayTabs = container.querySelectorAll('.day-tab-btn');
  for (var dt = 0; dt < dayTabs.length; dt++) {
    (function(tab) {
      tab.addEventListener('click', function() {
        var day = parseInt(tab.getAttribute('data-day'), 10);
        // Update active tab style
        var allTabs = container.querySelectorAll('.day-tab-btn');
        for (var at = 0; at < allTabs.length; at++) {
          allTabs[at].style.border = '1px solid #e5e7eb';
          allTabs[at].style.background = '#fff';
          allTabs[at].style.color = '#6b7280';
        }
        tab.style.border = '2px solid #4F46E5';
        tab.style.background = '#eef2ff';
        tab.style.color = '#4f46e5';
        // Show/hide content
        var dayContents = container.querySelectorAll('.day-content');
        for (var dc = 0; dc < dayContents.length; dc++) {
          dayContents[dc].style.display = (parseInt(dayContents[dc].getAttribute('data-day'), 10) === day) ? '' : 'none';
        }
      });
    })(dayTabs[dt]);
  }

  // Task checkbox handlers
  var checkboxes = container.querySelectorAll('.task-checkbox');
  for (var cb = 0; cb < checkboxes.length; cb++) {
    checkboxes[cb].addEventListener('click', function() {
      var tid = this.getAttribute('data-taskid');
      _toggleTaskComplete(tid);
      var isDone = _isItemCompleted(tid);
      this.style.borderColor = isDone ? '#10b981' : '#d1d5db';
      this.style.background = isDone ? '#10b981' : '#fff';
      this.innerHTML = isDone ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : '';
      _refreshHomeProgress();
    });
  }

  // Dictation check handlers
  var checkBtns = container.querySelectorAll('.dict-check-btn');
  for (var dcb = 0; dcb < checkBtns.length; dcb++) {
    checkBtns[dcb].addEventListener('click', function() {
      var input = this.previousElementSibling;
      var answer = input.getAttribute('data-answer');
      var userInput = input.value.trim();
      if (userInput.toLowerCase() === answer.toLowerCase()) {
        input.style.borderColor = '#10b981';
        input.style.background = '#f0fdf4';
        APP.showToast('✓ 正确！', 'success', 1500);
      } else {
        input.style.borderColor = '#ef4444';
        input.style.background = '#fef2f2';
        APP.showToast('✗ 正确答案: ' + answer, 'error', 4000);
        // Add to wrong words
        if (AppState) {
          var wrongIdx = -1;
          for (var ww = 0; ww < AppState.wrongWords.length; ww++) {
            if (AppState.wrongWords[ww].word === answer) {
              wrongIdx = ww;
              break;
            }
          }
          if (wrongIdx >= 0) {
            AppState.wrongWords[wrongIdx].count++;
          } else {
            AppState.wrongWords.push({ word: answer, week: weekNum, count: 1 });
          }
          schedulePersist();
        }
      }
      setTimeout(function() {
        input.style.borderColor = '#d1d5db';
        input.style.background = '#fff';
        input.value = '';
      }, 1500);
    });
  }

  // Mark day complete button
  var markBtn = document.getElementById('btn-mark-day-complete');
  if (markBtn) {
    markBtn.addEventListener('click', function() {
      var todayDay = activeDay;
      _markDayComplete(weekNum, todayDay);
      _refreshHomeProgress();
      // Re-render to update checkboxes
      renderListening('week', String(weekNum));
    });
  }

  // Attach audio buttons (deferred after DOM settle)
  setTimeout(function() {
    AudioSystem.init();
    // Attach audio buttons for word cards
    var audioPlaceholders = container.querySelectorAll('[id^="audio-listening-"]');
    for (var ap = 0; ap < audioPlaceholders.length; ap++) {
      var wordText = audioPlaceholders[ap].id.replace('audio-listening-', '');

      var weekData = _getWeekContent('listening', weekNum);
      if (weekData) {
        for (var d3 = 1; d3 <= 7; d3++) {
          var dayD = weekData.days[d3 - 1];
          if (dayD && dayD.tasks) {
            for (var t2 = 0; t2 < dayD.tasks.length; t2++) {
              if (dayD.tasks[t2].words) {
                for (var wi2 = 0; wi2 < dayD.tasks[t2].words.length; wi2++) {
                  var wd = dayD.tasks[t2].words[wi2];
                  if (wd.en.replace(/[^a-zA-Z]/g, '') === wordText) {
                    audioPlaceholders[ap].appendChild(createAudioButton(wd.en));
                  }
                }
              }
            }
          }
        }
      }
    }
    // Attach audio buttons for dictation
    var dictAudios = container.querySelectorAll('[id^="dict-audio-"]');
    for (var da = 0; da < dictAudios.length; da++) {
      var sentenceIdx = parseInt(dictAudios[da].id.replace('dict-audio-', ''), 10);

// ============================================================
// Part 21: Import / Export
// ============================================================
APP.exportProgress = function() {
  try {
    var exportData = {
      state: AppState,
      exportedAt: new Date().toISOString(),
      version: 1
    };
    var jsonStr = JSON.stringify(exportData);
    var base64 = btoa(unescape(encodeURIComponent(jsonStr)));
    return base64;
  } catch(e) {
    console.error('Export failed:', e);
    return null;
  }
};

APP.importProgress = function(base64Str) {
  try {
    var jsonStr = decodeURIComponent(escape(atob(base64Str)));
    var importData = JSON.parse(jsonStr);
    if (!importData.state || !importData.version) {
      return { success: false, error: '格式错误：无效的备份数据' };
    }
    // Validate state structure
    var requiredFields = ['currentWeek', 'currentDay', 'completedItems', 'stats', 'settings'];
    for (var i = 0; i < requiredFields.length; i++) {
      if (importData.state[requiredFields[i]] === undefined) {
        return { success: false, error: '格式错误：缺少必要字段 ' + requiredFields[i] };
      }
    }
    // Restore
    AppState = importData.state;
    _migrateState();
    schedulePersist();
    _refreshHomeProgress();
    _updateStreakBadge();
    return { success: true };
  } catch(e) {
    console.error('Import failed:', e);
    return { success: false, error: '导入失败，请检查备份字符串是否完整' };
  }
};

// ============================================================
// Part 22: Global Error Handler
// ============================================================
window.onerror = function(message, source, lineNo, colNo, error) {
  var detail = message + ' | line ' + lineNo;
  console.error('Global error:', detail);
  // Show visible error on page
  var errDiv = document.getElementById('js-error-display');
  if (!errDiv) {
    errDiv = document.createElement('div');
    errDiv.id = 'js-error-display';
    errDiv.style.cssText = 'position:fixed;bottom:60px;left:8px;right:8px;z-index:999;background:#fef2f2;border:2px solid #ef4444;border-radius:8px;padding:10px;font-size:12px;color:#dc2626;max-height:120px;overflow:auto;word-break:break-all';
    document.body.appendChild(errDiv);
  }
  errDiv.textContent = 'JS Error: ' + detail;
  errDiv.style.display = 'block';
  return true;
};

window.onunhandledrejection = function(event) {
  console.error('Unhandled rejection:', event.reason);
  var errDiv = document.getElementById('js-error-display');
  if (errDiv) {
    errDiv.textContent = (errDiv.textContent || '') + ' | Rejection: ' + (event.reason || '');
  }
  event.preventDefault();
};

// Part 25: Onboarding Overlay
// ============================================================
function _showOnboarding() {
  if (AppState && AppState.onboardingDone) return;
  var overlay = document.createElement('div');
  overlay.id = 'onboarding-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px';

  var steps = [
    {
      icon: '📚',
      title: '欢迎使用雅思备考助手',
      desc: '8周系统备考计划，覆盖听说读写四大模块，助你高效备考雅思。'
    },
    {
      icon: '✅',
      title: '每日完成任务打勾',
      desc: '按照周计划每天学习，完成一项任务后点击打勾标记进度。坚持就是胜利！'
    },
    {
      icon: '💾',
      title: '定期备份学习进度',
      desc: '记得在设置页定期导出备份。换设备时可以通过导入功能恢复所有进度。'
    }
  ];

  var currentStep = 0;
  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:20px;padding:32px 24px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)';

  function renderStep(idx) {
    var s = steps[idx];
    var h = '';
    h += '<div style="font-size:56px;margin-bottom:12px">' + s.icon + '</div>';
    h += '<h2 style="font-size:20px;font-weight:700;color:#1f2937;margin-bottom:8px">' + s.title + '</h2>';
    h += '<p style="font-size:14px;color:#6b7280;line-height:1.6;margin-bottom:24px">' + s.desc + '</p>';
    h += '<div style="display:flex;gap:8px;justify-content:center;margin-bottom:20px">';
    for (var d = 0; d < steps.length; d++) {
      h += '<div style="width:8px;height:8px;border-radius:50%;background:' + (d === idx ? '#4F46E5' : '#d1d5db') + '"></div>';
    }
    h += '</div>';
    if (idx < steps.length - 1) {
      h += '<div style="display:flex;gap:8px">';
      h += '<button id="onboard-skip" style="flex:1;padding:10px;border:1px solid #d1d5db;border-radius:10px;background:#fff;color:#9ca3af;font-size:14px;cursor:pointer">跳过</button>';
      h += '<button id="onboard-next" style="flex:1;padding:10px;border:none;border-radius:10px;background:#4F46E5;color:#fff;font-size:14px;cursor:pointer">下一步 →</button>';
      h += '</div>';
    } else {
      h += '<button id="onboard-done" style="width:100%;padding:12px;border:none;border-radius:10px;background:#10b981;color:#fff;font-size:16px;font-weight:600;cursor:pointer">开始学习！🚀</button>';
    }
    return h;
  }

  function updateStep() {
    box.innerHTML = renderStep(currentStep);
    _bindOnboardingButtons();
  }

  function _bindOnboardingButtons() {
    var skipBtn = document.getElementById('onboard-skip');
    var nextBtn = document.getElementById('onboard-next');
    var doneBtn = document.getElementById('onboard-done');

    if (skipBtn) {
      skipBtn.addEventListener('click', function() { closeOnboarding(); });
    }
    if (nextBtn) {
      nextBtn.addEventListener('click', function() {
        currentStep++;
        updateStep();
      });
    }
    if (doneBtn) {
      doneBtn.addEventListener('click', function() { closeOnboarding(); });
    }
  }

  function closeOnboarding() {
    updateState('onboardingDone', true);
    // Must set pointer-events:none so clicks pass through invisible overlay
    overlay.style.pointerEvents = 'none';
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity .3s';
    // Force remove after transition, with fallback
    setTimeout(function() {
      try {
        if (overlay && overlay.parentNode) {
          overlay.parentNode.removeChild(overlay);
        }
      } catch(e) {}
    }, 350);
    // Extra safety: ensure removal even if above fails
    setTimeout(function() {
      var el = document.getElementById('onboarding-overlay');
      if (el && el.parentNode) {
        el.parentNode.removeChild(el);
      }
    }, 2000);
  }

  box.innerHTML = renderStep(0);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  _bindOnboardingButtons();
}

// ============================================================
// Part 26: Collapsible Panel Re-wire Helper
// Used after setting innerHTML, re-attach click handlers to collapsible headers
// ============================================================
function _rewireCollapsiblePanels(container) {
  var headers = container.querySelectorAll('[style*="cursor:pointer"][style*="justify-content:space-between"]');
  for (var i = 0; i < headers.length; i++) {
    (function(header) {
      // Check if already wired
      if (header.getAttribute('data-wired') === '1') return;
      header.setAttribute('data-wired', '1');
      header.addEventListener('click', function() {
        var body = header.nextElementSibling;
        if (!body) return;
        var arrow = header.querySelector('.panel-arrow');
        var isOpen = body.style.maxHeight !== '0px' && body.style.maxHeight !== '0';
        if (isOpen) {
          body.style.maxHeight = '0';
          body.style.padding = '0 16px';
          if (arrow) arrow.style.transform = 'rotate(0deg)';
        } else {
          body.style.maxHeight = '2000px';
          body.style.padding = '0 16px';
          if (arrow) arrow.style.transform = 'rotate(180deg)';
        }
      });
    })(headers[i]);
  }
}
